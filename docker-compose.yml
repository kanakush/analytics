version: '3.8'

services:
  report-app:
    build: .
    container_name: oracle_analytics
    ports:
      - "8501:8501"
    # Подключаем файл .env напрямую, чтобы не прописывать каждую переменную вручную
    env_file:
      - .env
    # Это нужно, чтобы Streamlit корректно отдавал статику в Docker
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
